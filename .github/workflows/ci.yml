name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

# `postinstall` runs `prisma generate`, and prisma.config.ts resolves
# `env('DATABASE_URL')` at config-load time even though generate never
# connects. Provide a placeholder for every job; the `test` job overrides it
# with the real Postgres service URL.
env:
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: ESLint report (checkstyle)
        if: always()
        run: pnpm exec eslint . -f checkstyle -o eslint-report.xml || true

      - name: Set up reviewdog
        if: always()
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0

      - name: Annotate lint results
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=checkstyle -name=eslint -reporter=github-pr-check \
            -filter-mode=nofilter -fail-level=any < eslint-report.xml

      - name: Knip
        run: pnpm knip

      - name: Build
        run: pnpm build

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uchiyomi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uchiyomi_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uchiyomi_test

    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to the test database
        run: pnpm db:deploy

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Coverage comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
