name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

# `postinstall` runs `prisma generate`, and prisma.config.ts resolves
# `env('DATABASE_URL')` at config-load time even though generate never
# connects. Provide a placeholder for every job; the `test` job overrides it
# with the real Postgres service URL.
env:
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: ESLint report (checkstyle)
        if: always()
        run: pnpm exec eslint . -f checkstyle -o eslint-report.xml || true

      - name: Set up reviewdog
        if: always()
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0

      - name: Annotate lint results
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -f=checkstyle -name=eslint -reporter=github-pr-check \
            -filter-mode=nofilter -fail-level=any < eslint-report.xml

      - name: Knip
        run: pnpm knip

      - name: Build
        run: pnpm build

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uchiyomi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uchiyomi_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uchiyomi_test

    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to the test database
        run: pnpm db:deploy

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Coverage comment
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2.12.1

      # On master only: read the line-coverage % from the json-summary report and
      # publish it to a Gist that shields.io renders as the README badge. The
      # coverage figure never leaves our own GitHub assets.
      - name: Read coverage percentage
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && !cancelled() }}
        id: coverage
        run: |
          pct=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          echo "pct=$pct" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge Gist
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && !cancelled() }}
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: uchiyomi-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          valColorRange: ${{ steps.coverage.outputs.pct }}
          minColorRange: 50
          maxColorRange: 90
