services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uchiyomi
      POSTGRES_PASSWORD: uchiyomi
      POSTGRES_DB: uchiyomi
    ports:
      - '5432:5432'
    volumes:
      - uchiyomi-db:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U uchiyomi -d uchiyomi]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  uchiyomi-db:
