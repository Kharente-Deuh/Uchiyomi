services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uchiyomi
      POSTGRES_PASSWORD: uchiyomi
      POSTGRES_DB: uchiyomi
    # Host port 5433 to avoid clashing with a native Postgres (e.g. Postgres.app)
    # already bound to 5432. The container still listens on 5432 internally.
    ports:
      - '5433:5432'
    volumes:
      - uchiyomi-db:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U uchiyomi -d uchiyomi]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  uchiyomi-db:
